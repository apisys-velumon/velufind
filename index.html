<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APISYS veluFind</title>
    <link rel="stylesheet" href="https://unpkg.com" />
    <style>
        body { margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; font-family: sans-serif; overflow: hidden; }
        
        /* Gelbe Kopfleiste */
        .header {
            background-color: #FFD700;
            color: #5D4037;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 2000;
            height: 50px;
            box-sizing: border-box;
        }

        .header-title { font-weight: bold; font-size: 18px; }

        /* Donut Button */
        .donut-btn {
            width: 30px; height: 30px;
            background: transparent;
            border: 5px solid #5D4037;
            border-radius: 50%;
            cursor: pointer;
            padding: 0;
        }

        /* Pulldown Menü */
        #myDropdown {
            display: none;
            position: absolute; right: 10px; top: 55px;
            background: white; border: 1px solid #ccc;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            z-index: 3000; min-width: 160px;
            border-radius: 4px;
        }

        #myDropdown button {
            width: 100%; padding: 12px; border: none;
            background: none; text-align: left; cursor: pointer;
        }

        #myDropdown button:hover { background: #f0f0f0; }

        /* Karte */
        #map { flex-grow: 1; width: 100%; z-index: 1; background: #ddd; }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-title">APISYS veluFind</div>
        <button class="donut-btn" id="menuToggle"></button>
    </div>

    <div id="myDropdown">
        <button id="editBtn">📍 Standort korrigieren</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com"></script>
    <script>
        // 1. Karte initialisieren
        const map = L.map('map').setView([51.16, 10.45], 6);
        L.tileLayer('https://tile.openstreetmap.org{z}/{x}/{y}.png', {
            attribution: '© OSM'
        }).addTo(map);

        let userMarker;
        let isEditing = false;

        // 2. Standort finden
        map.locate({setView: true, maxZoom: 16});
        map.on('locationfound', e => {
            userMarker = L.marker(e.latlng).addTo(map).bindPopup("Du bist hier").openPopup();
        });

        // 3. Pulldown Menü Logik
        const menuToggle = document.getElementById('menuToggle');
        const dropdown = document.getElementById('myDropdown');

        menuToggle.onclick = (e) => {
            dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
            e.stopPropagation();
        };

        // Schließen wenn man woanders klickt
        window.onclick = () => { dropdown.style.display = 'none'; };

        // 4. Korrektur Logik
        document.getElementById('editBtn').onclick = function(e) {
            e.stopPropagation(); // Verhindert sofortiges Schließen
            if (!userMarker) return;
            
            isEditing = !isEditing;
            if (isEditing) {
                userMarker.dragging.enable();
                this.innerText = "✅ Speichern";
                userMarker.setPopupContent("Marker jetzt ziehen!").openPopup();
            } else {
                userMarker.dragging.disable();
                this.innerText = "📍 Standort korrigieren";
                userMarker.setPopupContent("Gespeichert!").openPopup();
                dropdown.style.display = 'none';
            }
        };

        // 5. Karten-Fix: Erzwinge Anzeige nach 300ms
        setTimeout(() => { map.invalidateSize(); }, 300);
    </script>
</body>
</html>
