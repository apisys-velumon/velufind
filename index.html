<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Standort-App Fix</title>
    
    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com" />
    <script src="https://unpkg.com"></script>

    <style>
        /* WICHTIG: Volle Höhe für alle Eltern-Elemente erzwingen */
        html, body { 
            height: 100%; width: 100%; margin: 0; padding: 0; 
        }
        
        /* Container mit absoluter Sicherheit auf Fullscreen setzen */
        #map { 
            height: 100%; width: 100%; position: absolute; top: 0; left: 0; background: #ddd; 
        }

        .ui-overlay {
            position: absolute; top: 10px; left: 50px; z-index: 2000;
            background: white; padding: 10px; border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3); font-family: Arial, sans-serif;
        }
        button { cursor: pointer; padding: 8px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="ui-overlay">
        <button id="editBtn">📍 Standort korrigieren</button>
        <div id="status" style="font-size: 11px; margin-top: 5px;">Warte auf GPS...</div>
    </div>

    <div id="map"></div>

    <script>
        // Karte initialisieren mit festem Fallback-Punkt
        const map = L.map('map').setView([51.16, 10.45], 6);

        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        let userMarker, isEditing = false;

        // Sofortige Korrektur der Kartengröße nach dem Laden
        setTimeout(() => { map.invalidateSize(); }, 500);

        // Ortung
        map.locate({setView: true, maxZoom: 15});

        map.on('locationfound', (e) => {
            document.getElementById('status').innerText = "Standort aktiv";
            userMarker = L.marker(e.latlng).addTo(map).bindPopup("Du bist hier").openPopup();
        });

        map.on('locationerror', () => {
            document.getElementById('status').innerText = "GPS-Zugriff fehlt!";
        });

        // Button-Funktion
        document.getElementById('editBtn').onclick = function() {
            if (!userMarker) return;
            isEditing = !isEditing;
            if (isEditing) {
                userMarker.dragging.enable();
                this.innerText = "✅ Speichern";
                document.getElementById('status').innerText = "Marker jetzt verschieben!";
            } else {
                userMarker.dragging.disable();
                this.innerText = "📍 Standort korrigieren";
                const pos = userMarker.getLatLng();
                document.getElementById('status').innerText = `Gespeichert: ${pos.lat.toFixed(4)}, ${pos.lng.toFixed(4)}`;
            }
        };
    </script>
</body>
</html>
