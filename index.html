<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APISYS veluFind</title>
    <link rel="stylesheet" href="https://unpkg.com" />
    <style>
        body { margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; font-family: sans-serif; overflow: hidden; }
        
        .header {
            background-color: #FFD700;
            color: #5D4037;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 2000;
            box-sizing: border-box;
            height: 60px;
        }

        .header-title { font-weight: bold; font-size: 20px; }

        /* Hamburger Button & X Animation */
        .hamburger-btn {
            width: 30px; height: 24px;
            background: transparent; border: none;
            cursor: pointer; padding: 0;
            display: flex; flex-direction: column; justify-content: space-between;
            position: relative; z-index: 3001;
        }

        .hamburger-btn span {
            display: block; height: 4px; width: 100%;
            background-color: #5D4037; border-radius: 2px;
            transition: all 0.3s ease-in-out;
        }

        /* X-Transformation */
        .hamburger-btn.open span:nth-child(1) { transform: translateY(10px) rotate(45deg); }
        .hamburger-btn.open span:nth-child(2) { opacity: 0; transform: translateX(-10px); }
        .hamburger-btn.open span:nth-child(3) { transform: translateY(-10px) rotate(-45deg); }

        /* Pulldown Menü mit Animation */
        .dropdown-menu {
            position: absolute;
            top: 60px; right: 15px;
            background: white;
            border: 1px solid #ccc;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            z-index: 3000;
            border-radius: 0 0 4px 4px;
            overflow: hidden;
            
            /* Animations-Status: versteckt */
            opacity: 0;
            transform: translateY(-20px);
            pointer-events: none;
            transition: all 0.3s ease-out;
        }

        /* Animations-Status: sichtbar */
        .dropdown-menu.show {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .dropdown-menu button {
            width: 100%; padding: 15px 25px;
            border: none; background: none;
            text-align: left; cursor: pointer;
            font-size: 14px; white-space: nowrap;
        }

        .dropdown-menu button:hover { background: #f0f0f0; }

        #map { flex-grow: 1; width: 100%; z-index: 1; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title">APISYS veluFind</div>
        <button class="hamburger-btn" id="menuToggle">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </div>
    
    <div id="myDropdown" class="dropdown-menu">
        <button id="editBtn">📍 Standort korrigieren</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com"></script>
    <script>
        const map = L.map('map').setView([51.505, -0.09], 13);
        L.tileLayer('https://tile.openstreetmap.org{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        let userMarker;
        let isEditing = false;

        map.locate({setView: true, maxZoom: 16});
        map.on('locationfound', e => {
            userMarker = L.marker(e.latlng).addTo(map).bindPopup("Hier bist du!").openPopup();
        });

        const menuBtn = document.getElementById('menuToggle');
        const dropdown = document.getElementById('myDropdown');

        menuBtn.onclick = (e) => {
            dropdown.classList.toggle('show');
            menuBtn.classList.toggle('open');
            e.stopPropagation();
        };

        window.onclick = () => {
            dropdown.classList.remove('show');
            menuBtn.classList.remove('open');
        };

        document.getElementById('editBtn').onclick = function(e) {
            e.stopPropagation();
            if (!userMarker) return;
            isEditing = !isEditing;
            
            if (isEditing) {
                userMarker.dragging.enable();
                this.innerText = "✅ Speichern";
                userMarker.setPopupContent("Zieh mich an die richtige Stelle!").openPopup();
            } else {
                userMarker.dragging.disable();
                this.innerText = "📍 Standort korrigieren";
                userMarker.setPopupContent("Position gespeichert!").openPopup();
                // Menü schließen
                dropdown.classList.remove('show');
                menuBtn.classList.remove('open');
            }
        };

        setTimeout(() => { map.invalidateSize(); }, 300);
    </script>
</body>
</html>
