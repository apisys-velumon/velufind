<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APISYS veluFind</title>
    <link rel="stylesheet" href="https://unpkg.com" />
    <style>
        body { margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; font-family: sans-serif; overflow: hidden; }
        .header { background-color: #FFD700; color: #5D4037; padding: 0 15px; display: flex; justify-content: space-between; align-items: center; z-index: 5000; height: 60px; position: fixed; top: 0; width: 100%; box-sizing: border-box; }
        .header-title { font-weight: bold; font-size: 20px; }
        #menu-checkbox { display: none; }
        .hamburger-btn { width: 30px; height: 24px; cursor: pointer; display: flex; flex-direction: column; justify-content: space-between; }
        .hamburger-btn span { display: block; height: 4px; width: 100%; background-color: #5D4037; border-radius: 2px; transition: 0.3s; }
        #menu-checkbox:checked ~ .header .hamburger-btn span:nth-child(1) { transform: translateY(10px) rotate(45deg); }
        #menu-checkbox:checked ~ .header .hamburger-btn span:nth-child(2) { opacity: 0; }
        #menu-checkbox:checked ~ .header .hamburger-btn span:nth-child(3) { transform: translateY(-10px) rotate(-45deg); }
        .dropdown-menu { position: fixed; top: 60px; right: 15px; background: white; border: 1px solid #ccc; box-shadow: 0 4px 10px rgba(0,0,0,0.2); z-index: 4999; border-radius: 4px; display: none; flex-direction: column; }
        #menu-checkbox:checked ~ .dropdown-menu { display: flex; }
        .dropdown-menu button { width: 100%; padding: 15px 20px; border: none; background: none; text-align: left; cursor: pointer; font-size: 16px; white-space: nowrap; }
        
        .input-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 6000; justify-content: center; align-items: center; }
        .input-box { background: white; padding: 20px; border-radius: 8px; width: fit-content; min-width: 240px; text-align: center; box-sizing: border-box; }
        .input-row { display: flex; gap: 10px; margin: 10px 0; align-items: center; justify-content: center; }
        
        input { width: 4.5em; padding: 8px; text-align: center; font-size: 16px; border: 1px solid #ccc; }
        #calculationResult, #directionValue { margin: 10px 0; padding: 12px; font-weight: bold; background: #f9f9f9; border-radius: 4px; font-size: 18px; }
        .submit-btn { width: 100%; padding: 12px; background: #FFD700; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; }
        
        .stepper-row { display: flex; align-items: center; justify-content: center; gap: 20px; margin: 10px 0; }
        .step-btn { width: 45px; height: 45px; background: #f0f0f0; border: 1px solid #ccc; border-radius: 50%; font-size: 20px; font-weight: bold; cursor: pointer; }
        .sensor-btn { background: #eee; border: 1px solid #ccc; padding: 10px; border-radius: 4px; font-size: 14px; margin-bottom: 15px; cursor: pointer; font-weight: bold; width: 100%; }

        #map-container { flex-grow: 1; width: 100%; margin-top: 60px; overflow: hidden; position: relative; }
        #map { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
    </style>
</head>
<body>
    <input type="checkbox" id="menu-checkbox">
    <div class="header">
        <div class="header-title">APISYS veluFind</div>
        <label for="menu-checkbox" class="hamburger-btn"><span></span><span></span><span></span></label>
    </div>

    <div class="dropdown-menu">
        <button id="editBtn">📍 Standort korrigieren</button>
        <button id="pathBtn">➕ Pfad</button>
    </div>

    <!-- Modals -->
    <div id="pathModal" class="input-overlay">
        <div class="input-box">
            <label style="font-weight: bold;">Flugzeit eingeben:</label>
            <div style="font-size: 0.9em; margin-top: 5px; color: #5D4037; white-space: pre;">Minuten       Sekunden</div>
            <div class="input-row">
                <input type="number" id="flightMinInput" placeholder="Min" min="0" max="99" inputmode="numeric">
                <span style="font-weight: bold;">:</span>
                <input type="number" id="flightSekInput" placeholder="Sek" min="0" max="59" inputmode="numeric">
            </div>
            <div id="calculationResult">Entfernung: 0 m</div>
            <button class="submit-btn" id="submitFlight">OK</button>
        </div>
    </div>

    <div id="directionModal" class="input-overlay">
        <div class="input-box">
            <label style="font-weight: bold;">Richtung</label>
            <div id="sensorBox" style="margin-top:10px;">
                <button id="activateCompass" class="sensor-btn">🧭 Kompass aktivieren</button>
            </div>
            <div class="stepper-row">
                <button class="step-btn" onclick="adjustHeading(-5)">-</button>
                <div id="directionValue">180°</div>
                <button class="step-btn" onclick="adjustHeading(5)">+</button>
            </div>
            <button class="submit-btn" id="confirmDirection">Vektor zeichnen</button>
        </div>
    </div>

    <div id="map-container">
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com"></script>
    <script>
        const checkbox = document.getElementById('menu-checkbox');
        const mapElement = document.getElementById('map');
        const map = L.map('map', { tap: false, zoomControl: false }).setView([51.505, -0.09], 13);
        L.tileLayer('https://tile.openstreetmap.org{z}/{x}/{y}.png', { attribution: '© OSM' }).addTo(map);
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        let userMarker, distanceCircle, directionLine;
        let isEditing = false, currentHeading = 180, manualOverride = false, sensorEnabled = false;

        map.locate({setView: true, maxZoom: 16});
        map.on('locationfound', e => { 
            if(!userMarker) userMarker = L.marker(e.latlng).addTo(map).bindPopup("Hier bist du!").openPopup(); 
        });

        function handleOrientation(e) {
            if (!sensorEnabled) return; // Rotation nur, wenn Sensor-Modus aktiv
            let heading = e.webkitCompassHeading || (360 - e.alpha);
            if (heading) {
                mapElement.style.transform = `rotate(${-heading}deg)`;
                if (!manualOverride) {
                    currentHeading = Math.round(heading);
                    updateHeadingUI();
                }
            }
        }

        function updateHeadingUI() {
            document.getElementById('directionValue').innerText = currentHeading + "°";
        }

        function adjustHeading(val) {
            manualOverride = true; 
            currentHeading = (currentHeading + val + 360) % 360;
            updateHeadingUI();
        }

        const pathModal = document.getElementById('pathModal'), directionModal = document.getElementById('directionModal');
        const minInput = document.getElementById('flightMinInput'), sekInput = document.getElementById('flightSekInput'), resultDiv = document.getElementById('calculationResult');

        document.getElementById('activateCompass').onclick = function() {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(state => {
                    if (state === 'granted') {
                        window.addEventListener('deviceorientation', handleOrientation, true);
                        sensorEnabled = true;
                        document.getElementById('activateCompass').style.display = 'none';
                    }
                });
            } else {
                window.addEventListener('deviceorientationabsolute', handleOrientation, true);
                sensorEnabled = true;
                document.getElementById('activateCompass').style.display = 'none';
            }
        };

        document.getElementById('submitFlight').onclick = function() {
            pathModal.style.display = 'none';
            directionModal.style.display = 'flex';
            manualOverride = false;
        };

        document.getElementById('confirmDirection').onclick = function() {
            // 1. Rotation ausschalten
            sensorEnabled = false;
            mapElement.style.transform = `rotate(0deg)`;

            const min = parseInt(minInput.value) || 0, sek = parseInt(sekInput.value) || 0;
            let distance = (((min * 60) + sek) - 45) / 2;
            distance = distance < 0 ? 0 : distance;

            if (distance > 0 && userMarker) {
                const start = userMarker.getLatLng();
                const angle = (currentHeading * Math.PI) / 180;
                const dLat = (distance * Math.cos(angle)) / 111320;
                const dLon = (distance * Math.sin(angle)) / (111320 * Math.cos(start.lat * Math.PI / 180));
                const end = [start.lat + dLat, start.lng + dLon];

                if (distanceCircle) map.removeLayer(distanceCircle);
                if (directionLine) map.removeLayer(directionLine);

                distanceCircle = L.circle(start, { radius: distance, color: '#5D4037', fillOpacity: 0.1 }).addTo(map);
                directionLine = L.polyline([start, end], { color: 'red', weight: 4 }).addTo(map);
                
                // 2. Wieder die ganze Karte (Vektor + Kreis) anzeigen
                map.fitBounds(distanceCircle.getBounds());
            }
            directionModal.style.display = 'none';
        };

        document.getElementById('pathBtn').onclick = () => { checkbox.checked = false; pathModal.style.display = 'flex'; };
        document.getElementById('editBtn').onclick = function() {
            checkbox.checked = false;
            isEditing = !isEditing;
            isEditing ? userMarker.dragging.enable() : userMarker.dragging.disable();
            this.innerText = isEditing ? "✅ Speichern" : "📍 Standort korrigieren";
        };

        minInput.oninput = () => {
            const min = parseInt(minInput.value) || 0, sek = parseInt(sekInput.value) || 0;
            let total = (((min * 60) + sek) - 45) / 2;
            resultDiv.innerText = "Entfernung: " + (total < 0 ? 0 : total) + " m";
        };
        sekInput.oninput = minInput.oninput;

        setTimeout(() => { map.invalidateSize(); }, 400);
    </script>
</body>
</html>
