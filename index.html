<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Standort App Fix</title>
    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        /* Erzwungene Vollbild-Anzeige */
        html, body, #map { height: 100% !important; width: 100% !important; margin: 0; padding: 0; background: #ddd; }
        .ui { position: absolute; top: 10px; left: 10px; z-index: 9999; background: white; padding: 10px; border-radius: 4px; box-shadow: 0 2px 6px rgba(0,0,0,0.3); font-family: sans-serif; }
        button { cursor: pointer; padding: 8px; font-weight: bold; background: #007bff; color: white; border: none; border-radius: 3px; }
    </style>
</head>
<body>
    <div class="ui">
        <button id="editBtn">📍 Standort korrigieren</button>
        <div id="status" style="font-size: 12px; margin-top: 5px;">Suche GPS...</div>
    </div>
    <div id="map"></div>

    <script>
        // 1. Karte initialisieren
        const map = L.map('map').setView([51.1, 10.4], 5);

        // 2. Kachel-Layer mit alternativem Server (CartoDB ist oft weniger restriktiv)
        L.tileLayer('https://{s}://{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        let marker;
        let isEditing = false;

        // 3. Standort finden
        map.locate({setView: true, maxZoom: 16});

        map.on('locationfound', (e) => {
            marker = L.marker(e.latlng).addTo(map).bindPopup("Hier bist du").openPopup();
            document.getElementById('status').innerText = "Bereit.";
        });

        // 4. Button-Logik
        document.getElementById('editBtn').onclick = function() {
            if (!marker) return;
            isEditing = !isEditing;
            if (isEditing) {
                marker.dragging.enable();
                this.innerText = "✅ Speichern";
                document.getElementById('status').innerText = "Marker ziehen...";
            } else {
                marker.dragging.disable();
                this.innerText = "📍 Standort korrigieren";
                const p = marker.getLatLng();
                document.getElementById('status').innerText = `Neu: ${p.lat.toFixed(4)}, ${p.lng.toFixed(4)}`;
            }
        };

        // WICHTIG: Die Karte nach 500ms "wachschütteln"
        setTimeout(() => { map.invalidateSize(); }, 500);
    </script>
</body>
</html>
