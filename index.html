<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APISYS veluFind</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; font-family: sans-serif; }
        
        /* Gelbe Kopfleiste mit brauner Schrift */
        .header {
            background-color: #FFD700;
            color: #5D4037;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 2000;
            box-sizing: border-box;
            height: 60px;
        }

        .header-title { font-weight: bold; font-size: 20px; }

        /* Hamburger Button Design */
        .hamburger-btn {
            width: 30px;
            height: 24px;
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
        }

        /* Die drei Hamburger-Striche */
        .hamburger-btn span {
            display: block;
            height: 4px;
            width: 100%;
            background-color: #5D4037;
            border-radius: 2px;
        }

        /* Pulldown Menü */
        .dropdown-menu {
            display: none;
            position: absolute;
            top: 65px; right: 15px;
            background: white;
            border: 1px solid #ccc;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            z-index: 3000;
            border-radius: 4px;
            overflow: hidden;
        }

        .dropdown-menu button {
            width: 100%;
            padding: 12px 20px;
            border: none;
            background: none;
            text-align: left;
            cursor: pointer;
            font-size: 14px;
            white-space: nowrap;
        }

        .dropdown-menu button:hover { background: #f0f0f0; }

        #map { flex-grow: 1; width: 100%; z-index: 1; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title">APISYS veluFind</div>
        <button class="hamburger-btn" id="menuToggle">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </div>
    
    <div id="myDropdown" class="dropdown-menu">
        <button id="editBtn">📍 Standort korrigieren</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([51.505, -0.09], 13);
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        let userMarker;
        let isEditing = false;

        map.locate({setView: true, maxZoom: 16});
        
        map.on('locationfound', e => {
            userMarker = L.marker(e.latlng).addTo(map).bindPopup("Hier bist du!").openPopup();
        });

        // Menü Logik
        const menuBtn = document.getElementById('menuToggle');
        const dropdown = document.getElementById('myDropdown');

        menuBtn.onclick = (e) => {
            dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
            e.stopPropagation();
        };

        window.onclick = () => { dropdown.style.display = 'none'; };

        // Button-Logik innerhalb des Menüs
        document.getElementById('editBtn').onclick = function(e) {
            e.stopPropagation();
            if (!userMarker) return;
            isEditing = !isEditing;
            
            if (isEditing) {
                userMarker.dragging.enable();
                this.innerText = "✅ Speichern";
                userMarker.setPopupContent("Zieh mich an die richtige Stelle!").openPopup();
            } else {
                userMarker.dragging.disable();
                this.innerText = "📍 Standort korrigieren";
                userMarker.setPopupContent("Position gespeichert!").openPopup();
                dropdown.style.display = 'none';
            }
        };

        setTimeout(() => { map.invalidateSize(); }, 300);
    </script>
</body>
</html>
