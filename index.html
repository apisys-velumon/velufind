<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APISYS veluFind</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* Gelbe Kopfleiste mit brauner Schrift */
        .header {
            background-color: #FFD700;
            color: #5D4037;
            padding: 10px;
            text-align: center;
            font-family: sans-serif;
            font-weight: bold;
            font-size: 20px;
            z-index: 1001;
        }

        #map { flex-grow: 1; width: 100%; }

        .controls {
            position: absolute; top: 60px; left: 50px; z-index: 1000;
            background: white; padding: 5px; border: 1px solid #ccc;
        }
    </style>
</head>
<body>
    <div class="header">APISYS veluFind</div>
    
    <div class="controls">
        <button id="editBtn">📍 Standort korrigieren</button>
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([51.505, -0.09], 13);
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        let userMarker;
        let isEditing = false;

        map.locate({setView: true, maxZoom: 16});
        
        map.on('locationfound', e => {
            // Marker wird erstellt, der Kreis (L.circle) wurde hier entfernt
            userMarker = L.marker(e.latlng).addTo(map).bindPopup("Hier bist du!").openPopup();
        });

        // Button-Logik
        document.getElementById('editBtn').onclick = function() {
            if (!userMarker) return;
            isEditing = !isEditing;
            
            if (isEditing) {
                userMarker.dragging.enable();
                this.innerText = "✅ Speichern";
                userMarker.setPopupContent("Zieh mich an die richtige Stelle!").openPopup();
            } else {
                userMarker.dragging.disable();
                this.innerText = "📍 Standort korrigieren";
                const pos = userMarker.getLatLng();
                userMarker.setPopupContent("Position gespeichert!").openPopup();
                console.log("Neue Koordinaten:", pos.lat, pos.lng);
            }
        };

        // Kleiner Fix für die Kartengröße nach dem Laden
        setTimeout(() => { map.invalidateSize(); }, 200);
    </script>
</body>
</html>
